---
name: Publish
on:
  push:
    branches:
      - main
    tags:
      - v*
defaults:
  run:
    shell: bash
permissions: {}
jobs:
  publishProtos:
    name: Publish Protobufs
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Push to BSR
        uses: cerbos/actions/buf@f73c5fd3cd8b66cad9d757a8686cc30d0f209f84 # main
        with:
          token: ${{ secrets.BUF_TOKEN }}
